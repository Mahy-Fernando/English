<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>English</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="flyer-section" aria-label="Panfleto informativo">
      <img class="flyer-image" src="panfleto.png" alt="Panfleto informativo">
    </section>

    <section class="contact-section" aria-label="Informações para contato">
      <h1 class="contact-title">
  <span>Informações de contato</span>
  <span class="contact-title-jp">連絡先情報</span>
</h1>

      <div class="contact-list">
        <button class="copy-button" type="button" data-copy="ejp.kikugawa@gmail.com">
          <span class="copy-label">Copiar e-mail</span>
          <span class="copy-label-jp">メールをコピー</span>
          <span class="copy-value">ejp.kikugawa@gmail.com</span>
        </button>

        <button class="copy-button" type="button" data-copy="080 6956-3763">
          <span class="copy-label">Copiar Line</span>
          <span class="copy-label-jp">LINEをコピー</span>
         <span class="copy-value">080 6956-3763</span>
         <span class="copy-note">
  Apenas mensagens pelo Line.
  <span class="copy-note-jp">LINEメッセージ専用です。</span>
</span>
        </button>
      </div>

      <div class="copy-toast" id="copyMessage" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
